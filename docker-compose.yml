version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: clipdd
      POSTGRES_USER: clipdd
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  web:
    build: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media:/app/media
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: celery -A config worker -l info -Q default,video
    volumes:
      - ./backend:/app
      - media:/app/media
    env_file: .env
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: .env

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx:/etc/nginx/conf.d
      - media:/media
    depends_on:
      - web
      - frontend

volumes:
  pgdata:
  media:
