server {
    listen 80;
    server_name clipdd.com www.clipdd.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name clipdd.com www.clipdd.com;

    ssl_certificate /etc/letsencrypt/live/clipdd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clipdd.com/privkey.pem;

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend API
    location /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Media files
    location /media/ {
        alias /media/;
    }

    client_max_body_size 50M;
}
