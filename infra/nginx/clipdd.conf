# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=60r/s;

server {
    listen 80;
    server_name clipdd.com www.clipdd.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name clipdd.com www.clipdd.com;

    ssl_certificate     /etc/letsencrypt/live/clipdd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clipdd.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ──────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "SAMEORIGIN" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection           "1; mode=block" always;

    # Global rate limit
    limit_req zone=global_limit burst=100 nodelay;

    # Frontend (Next.js)
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API — rate limited
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://web:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Chat API — stricter rate limit (calls Gemini API)
    location /api/support/chat/ {
        limit_req zone=chat_limit burst=5 nodelay;
        proxy_pass         http://web:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Django Admin
    location /admin/ {
        proxy_pass         http://web:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Django Static
    location /static/ {
        proxy_pass http://web:8000;
    }

    # Media files — restrict to allowed extensions
    location /media/ {
        alias /media/;
        add_header Cache-Control "public, max-age=86400";
        location ~* \.(mp4|jpg|jpeg|png|webp|gif|mp3)$ {
            alias /media/;
            add_header Cache-Control "public, max-age=86400";
        }
        location ~ \.(php|py|sh|env)$ { deny all; }
    }

    client_max_body_size 100M;
    gzip on;
    gzip_types text/plain application/json text/css application/javascript image/svg+xml;
}
